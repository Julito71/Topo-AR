<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Next-Gen Field Logic - CAD/AR Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface": "#1c110b",
                      "error-container": "#93000a",
                      "on-primary-fixed": "#341100",
                      "secondary-fixed": "#d5e3fd",
                      "primary-fixed": "#ffdbca",
                      "on-background": "#f6ded3",
                      "on-tertiary": "#003351",
                      "surface-container-highest": "#40322a",
                      "background": "#1c110b",
                      "secondary-fixed-dim": "#b9c7e0",
                      "on-tertiary-fixed": "#001d32",
                      "on-surface-variant": "#e0c0b1",
                      "inverse-surface": "#f6ded3",
                      "on-error": "#690005",
                      "surface-container-lowest": "#160c06",
                      "on-primary-fixed-variant": "#783200",
                      "secondary-container": "#3c4a5e",
                      "tertiary-container": "#00a2f4",
                      "surface-container-low": "#251913",
                      "on-surface": "#f6ded3",
                      "surface-tint": "#ffb690",
                      "on-secondary": "#233144",
                      "on-primary": "#552100",
                      "outline-variant": "#584237",
                      "primary-container": "#f97316",
                      "error": "#ffb4ab",
                      "on-secondary-fixed-variant": "#3a485c",
                      "secondary": "#b9c7e0",
                      "on-secondary-container": "#abb9d2",
                      "surface-container-high": "#352720",
                      "surface-variant": "#40322a",
                      "surface-bright": "#45362f",
                      "surface-container": "#291d16",
                      "on-primary-container": "#582200",
                      "tertiary-fixed-dim": "#93ccff",
                      "on-secondary-fixed": "#0d1c2f",
                      "on-error-container": "#ffdad6",
                      "on-tertiary-container": "#003554",
                      "tertiary": "#93ccff",
                      "inverse-primary": "#9d4300",
                      "primary-fixed-dim": "#ffb690",
                      "tertiary-fixed": "#cde5ff",
                      "outline": "#a78b7d",
                      "on-tertiary-fixed-variant": "#004b74",
                      "surface-dim": "#1c110b",
                      "inverse-on-surface": "#3c2d26",
                      "primary": "#ffb690"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline-lg": ["Geist"],
                      "body-sm": ["Inter"],
                      "display-lg": ["Geist"],
                      "data-mono": ["JetBrains Mono"],
                      "body-lg": ["Inter"],
                      "title-md": ["Inter"]
              }
            }
          }
        }
    </script>
<style>
        body { font-family: "Inter", sans-serif; background-color: #1c110b; color: #f6ded3; margin: 0; overflow: hidden; }
        .ar-viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .cad-overlay { position: absolute; inset: 0; pointer-events: none; mix-blend-mode: screen; opacity: 0.8; }
        .hud-glass { background: rgba(28, 17, 11, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(88, 66, 55, 0.5); }
        .drawer-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .layer-active { color: #f97316; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="ar-viewport">
<!-- Camera Feed (Placeholder) -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A first-person perspective view of a construction site during the golden hour. In the foreground, concrete columns and reinforcement bars are visible. The lighting is warm and cinematic, reflecting off industrial equipment. The scene is crisp and high-resolution, captured with a professional wide-angle lens to emphasize depth and scale for an augmented reality application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtRsBA6SPq443tTARDrsBxpjJZpkRoBXpp2gZbRYbuQYFtBbh_Hs0cZGrq7IVlK3_Jq7_zPyPUSB9CI-6VlY6skSoJ1pI8syKEq3SpIChucIPnL7ryINMNuqDLQnhFmEIcp_PG0nvFdhj29qZFGPIBwmcU59271SPnpNVu6ht367ScqrhI6NFB7JWlJ9BHgScj6eP2trwjP27qPThjB4-fopmmP-emyLmDABylJZVzKJNOp7uB6o10"/>
</div>
<!-- WebGL CAD Overlay Animation -->
<div class="cad-overlay z-10 flex items-center justify-center">
<!-- Using a shader to represent the complex CAD wireframe overlay -->
<webgl-shader class="w-full h-full" src="{{DATA:ANIMATION:ANIMATION_1}}"></webgl-shader>
</div>
<!-- HUD: Top System Metrics -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 z-30 w-[90%] max-w-lg">
<div class="hud-glass rounded-xl px-4 py-2 flex items-center justify-between shadow-2xl">
<div class="flex items-center gap-4">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary-container text-sm">precision_manufacturing</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-outline">Stability</span>
<span class="text-xs font-data-mono text-white">98%</span>
</div>
<div class="w-px h-4 bg-outline-variant"></div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary-container text-sm">sensors</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-outline">LiDAR</span>
<span class="text-xs font-data-mono text-white">Active</span>
</div>
<div class="w-px h-4 bg-outline-variant"></div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-primary-container text-sm">location_on</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-outline">GPS</span>
<span class="text-xs font-data-mono text-white">±0.2m</span>
</div>
</div>
<div class="flex items-center gap-2 ml-4 pl-4 border-l border-outline-variant">
<span class="material-symbols-outlined text-white text-lg">settings</span>
</div>
</div>
</div>
<!-- Side Button: Layer Management Trigger -->
<button class="absolute left-4 top-1/2 -translate-y-1/2 z-30 hud-glass size-12 rounded-full flex items-center justify-center text-white active:scale-95 transition-transform" onclick="toggleDrawer()">
<span class="material-symbols-outlined" id="layer-icon">layers</span>
</button>
<!-- Layer Management Drawer -->
<div class="absolute left-0 top-0 h-full w-72 hud-glass z-40 drawer-transition -translate-x-full flex flex-col p-6" id="layer-drawer">
<div class="flex items-center justify-between mb-8">
<h2 class="font-headline-lg text-lg text-white">Gestión de Capas</h2>
<button class="text-outline hover:text-white" onclick="toggleDrawer()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="space-y-4">
<p class="text-[10px] font-bold uppercase tracking-widest text-outline-variant mb-2">Visibilidad CAD</p>
<!-- Layer Item -->
<label class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant cursor-pointer transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">architecture</span>
<span class="text-body-lg text-white">Vigas</span>
</div>
<input checked="" class="rounded border-outline-variant bg-surface text-primary-container focus:ring-primary-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant cursor-pointer transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">view_column</span>
<span class="text-body-lg text-white">Columnas</span>
</div>
<input checked="" class="rounded border-outline-variant bg-surface text-primary-container focus:ring-primary-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant cursor-pointer transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">plumbing</span>
<span class="text-body-lg text-white">Instalaciones</span>
</div>
<input class="rounded border-outline-variant bg-surface text-primary-container focus:ring-primary-container" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low border border-transparent hover:border-outline-variant cursor-pointer transition-all">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">foundation</span>
<span class="text-body-lg text-white">Cimientos</span>
</div>
<input class="rounded border-outline-variant bg-surface text-primary-container focus:ring-primary-container" type="checkbox"/>
</label>
</div>
<div class="mt-auto pt-6 border-t border-outline-variant">
<div class="flex flex-col gap-2">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline-variant">Opacidad del Plano
<input class="w-full accent-primary-container bg-surface-container-highest rounded-lg appearance-none h-1.5" max="100" min="0" oninput="updateOpacity(this.value)" type="range" value="80"/>
<div class="flex justify-between text-[10px] text-outline font-data-mono">
<span>0%</span>
<span>100%</span>
</div>
</label></div>
</div>
</div>
<!-- Crosshair Target -->
<div class="absolute inset-0 pointer-events-none z-20 flex items-center justify-center">
<div class="relative size-16">
<div class="absolute inset-0 border-2 border-primary-container/30 rounded-full animate-pulse"></div>
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[2px] h-3 bg-primary-container"></div>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[2px] h-3 bg-primary-container"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-[2px] w-3 bg-primary-container"></div>
<div class="absolute right-0 top-1/2 -translate-y-1/2 h-[2px] w-3 bg-primary-container"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="size-1 bg-primary-container rounded-full"></div>
</div>
</div>
</div>
<!-- Ergonomic Action Buttons (Thumb Area) -->
<div class="absolute bottom-10 left-0 w-full px-8 z-30 flex justify-between items-end gap-6">
<!-- Snap to CAD Button -->
<button class="flex-1 max-w-[180px] h-16 hud-glass rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform border-b-4 border-primary-container/40">
<span class="material-symbols-outlined text-primary-container">grid_guides</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white">Snap to CAD</span>
</button>
<!-- Main Trigger (Record/Capture) -->
<div class="relative flex items-center justify-center">
<div class="absolute size-24 rounded-full border border-primary-container/20 animate-ping"></div>
<button class="size-20 bg-primary-container text-on-primary-fixed rounded-full shadow-[0_0_40px_rgba(249,115,22,0.4)] flex items-center justify-center active:scale-90 transition-all">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</button>
</div>
<!-- Confirm Point Button -->
<button class="flex-1 max-w-[180px] h-16 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white">check_circle</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-white">Confirm Point</span>
</button>
</div>
<!-- Mini Bottom Info Bar -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-30">
<p class="text-[9px] font-data-mono text-outline uppercase tracking-[0.2em] whitespace-nowrap">Coord: 19.4326° N, 99.1332° W | Alt: 2,240m</p>
</div>
</div>
<script>
    function toggleDrawer() {
        const drawer = document.getElementById('layer-drawer');
        const icon = document.getElementById('layer-icon');
        const isOpen = !drawer.classList.contains('-translate-x-full');
        
        if (isOpen) {
            drawer.classList.add('-translate-x-full');
            icon.textContent = 'layers';
        } else {
            drawer.classList.remove('-translate-x-full');
            icon.textContent = 'arrow_back';
        }
    }

    function updateOpacity(val) {
        const overlay = document.querySelector('.cad-overlay');
        overlay.style.opacity = val / 100;
    }

    // Micro-interaction: haptic feedback simulation
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        });
    });
</script>
</body></html>
